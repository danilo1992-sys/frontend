services:
  - type: web
    name: frontend-app
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/server/entry.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "4321"
